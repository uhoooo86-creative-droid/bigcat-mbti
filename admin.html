<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BIGCAT JUKEBOX — Admin</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Nunito:wght@400;700;900&display=swap');

  :root {
    --bg: #070710;
    --surface: #0e0e1c;
    --card: #16162a;
    --border: #2a2a4a;
    --yellow: #f5e642;
    --pink: #ff2d78;
    --cyan: #00f5d4;
    --orange: #ff6b2b;
    --purple: #b14fff;
    --text: #f0f0f0;
    --muted: #666;
    --success: #00e676;
    --danger: #ff5252;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* scanlines */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.05) 2px, rgba(0,0,0,0.05) 4px);
    pointer-events: none;
    z-index: 9999;
  }

  /* ── LOGIN ── */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }
  .login-box {
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 20px;
    padding: 40px 32px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    box-shadow: 0 0 60px rgba(245,230,66,0.12);
  }
  .login-logo {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.8rem;
    color: var(--yellow);
    text-shadow: 0 0 20px rgba(245,230,66,0.5);
    margin-bottom: 4px;
  }
  .login-sub {
    font-size: 0.75rem;
    letter-spacing: 3px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 32px;
    opacity: 0.8;
  }
  .login-label {
    font-size: 0.8rem;
    color: var(--muted);
    text-align: left;
    margin-bottom: 8px;
    letter-spacing: 1px;
  }
  .login-input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 4px;
    outline: none;
    transition: border-color 0.2s;
    text-align: center;
    margin-bottom: 6px;
  }
  .login-input:focus { border-color: var(--yellow); }
  .login-error {
    color: var(--danger);
    font-size: 0.8rem;
    height: 18px;
    margin-bottom: 16px;
  }
  .btn-login {
    width: 100%;
    padding: 14px;
    background: var(--yellow);
    color: #000;
    border: none;
    border-radius: 10px;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.1rem;
    cursor: pointer;
    transition: all 0.25s;
    box-shadow: 0 4px 20px rgba(245,230,66,0.3);
  }
  .btn-login:hover { box-shadow: 0 6px 30px rgba(245,230,66,0.5); transform: translateY(-1px); }

  /* ── ADMIN MAIN ── */
  .admin-wrap { max-width: 760px; margin: 0 auto; padding: 20px; display: none; }

  .admin-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 24px 0 20px;
    border-bottom: 2px solid var(--border);
    margin-bottom: 28px;
  }
  .admin-title {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 1.4rem;
    color: var(--yellow);
    text-shadow: 0 0 12px rgba(245,230,66,0.3);
  }
  .admin-badge {
    background: rgba(0,245,212,0.15);
    color: var(--cyan);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 0.72rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .logout-btn {
    background: none;
    border: 2px solid var(--border);
    color: var(--muted);
    border-radius: 8px;
    padding: 6px 14px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.8rem;
    transition: all 0.2s;
  }
  .logout-btn:hover { border-color: var(--pink); color: var(--pink); }

  /* ── CLOUDINARY CONFIG ── */
  .config-box {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    margin-bottom: 28px;
  }
  .config-title {
    font-size: 0.7rem;
    letter-spacing: 3px;
    color: var(--cyan);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-bottom: 10px;
  }
  .config-field label {
    display: block;
    font-size: 0.72rem;
    color: var(--muted);
    margin-bottom: 6px;
    letter-spacing: 1px;
  }
  .config-field input {
    width: 100%;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .config-field input:focus { border-color: var(--cyan); }
  .config-save-btn {
    background: rgba(0,245,212,0.15);
    color: var(--cyan);
    border: 2px solid var(--cyan);
    border-radius: 8px;
    padding: 8px 20px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.85rem;
    font-weight: 700;
    transition: all 0.2s;
    margin-top: 4px;
  }
  .config-save-btn:hover { background: rgba(0,245,212,0.25); }

  /* ── STYLE TABS ── */
  .style-tabs {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 20px;
  }
  .style-tab {
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 10px;
    padding: 8px 18px;
    cursor: pointer;
    font-family: 'Black Han Sans', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    transition: all 0.2s;
  }
  .style-tab.active {
    background: rgba(245,230,66,0.1);
    border-color: var(--yellow);
    color: var(--yellow);
  }

  /* ── TRACK ROWS ── */
  .track-list { display: flex; flex-direction: column; gap: 12px; }

  .track-row {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    transition: border-color 0.2s;
  }
  .track-row.has-song { border-color: rgba(0,230,118,0.35); }
  .track-row:hover { border-color: var(--yellow); }

  .track-row-top {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }
  .track-step-badge {
    background: rgba(0,245,212,0.12);
    color: var(--cyan);
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 0.72rem;
    font-weight: 700;
    white-space: nowrap;
  }
  .track-song-name {
    flex: 1;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .track-song-name.empty { color: var(--muted); font-weight: 400; font-style: italic; }
  .track-status {
    font-size: 0.75rem;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .track-status.ok { background: rgba(0,230,118,0.15); color: var(--success); }
  .track-status.none { background: rgba(255,255,255,0.06); color: var(--muted); }

  .track-upload-area {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }
  .upload-btn {
    position: relative;
    background: rgba(245,230,66,0.1);
    border: 2px dashed rgba(245,230,66,0.4);
    border-radius: 10px;
    padding: 10px 18px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--yellow);
    transition: all 0.2s;
  }
  .upload-btn:hover { background: rgba(245,230,66,0.18); border-style: solid; }
  .upload-btn input[type=file] {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    font-size: 0;
  }
  .upload-btn.loading { opacity: 0.6; pointer-events: none; }

  .track-url-input {
    flex: 1;
    background: var(--surface);
    border: 2px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    outline: none;
    min-width: 160px;
    transition: border-color 0.2s;
  }
  .track-url-input:focus { border-color: var(--cyan); }
  .track-url-input::placeholder { color: var(--muted); }

  .url-save-btn {
    background: rgba(0,245,212,0.12);
    border: 2px solid var(--cyan);
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    font-family: 'Nunito', sans-serif;
    font-size: 0.78rem;
    font-weight: 700;
    color: var(--cyan);
    transition: all 0.2s;
  }
  .url-save-btn:hover { background: rgba(0,245,212,0.22); }

  .delete-btn {
    background: rgba(255,82,82,0.1);
    border: 2px solid rgba(255,82,82,0.3);
    border-radius: 8px;
    padding: 8px 10px;
    cursor: pointer;
    color: var(--danger);
    font-size: 0.85rem;
    transition: all 0.2s;
  }
  .delete-btn:hover { background: rgba(255,82,82,0.2); }

  .upload-progress {
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 8px;
    display: none;
  }
  .upload-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), var(--pink));
    border-radius: 2px;
    width: 0%;
    transition: width 0.3s;
  }

  /* toast */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--card);
    border: 2px solid var(--yellow);
    border-radius: 40px;
    padding: 12px 28px;
    font-size: 0.88rem;
    font-weight: 700;
    color: var(--yellow);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    transition: transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: 10000;
    white-space: nowrap;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }

  /* section label */
  .section-label {
    font-size: 0.65rem;
    letter-spacing: 4px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .divider {
    border: none;
    border-top: 2px solid var(--border);
    margin: 28px 0;
  }

  /* stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-bottom: 28px;
  }
  .stat-card {
    background: var(--card);
    border: 2px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Black Han Sans', sans-serif;
    font-size: 2rem;
    color: var(--yellow);
    line-height: 1;
  }
  .stat-label { font-size: 0.72rem; color: var(--muted); margin-top: 4px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-wrap" id="login-screen">
  <div class="login-box">
    <div class="login-logo">🐱 BIGCAT</div>
    <div class="login-sub">Jukebox Admin</div>
    <div class="login-label">관리자 토큰</div>
    <input class="login-input" type="password" id="token-input" placeholder="••••••••" maxlength="20"
      onkeydown="if(event.key==='Enter')doLogin()">
    <div class="login-error" id="login-error"></div>
    <button class="btn-login" onclick="doLogin()">🔐 입장하기</button>
  </div>
</div>

<!-- ADMIN MAIN -->
<div class="admin-wrap" id="admin-screen">
  <div class="admin-header">
    <div>
      <div class="admin-title">🎵 Jukebox Admin</div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div class="admin-badge">BIGCAT</div>
      <button class="logout-btn" onclick="logout()">로그아웃</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">총 등록 곡</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-styles">5</div>
      <div class="stat-label">스타일 수</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="stat-slots">30</div>
      <div class="stat-label">총 슬롯</div>
    </div>
  </div>

  <!-- CLOUDINARY CONFIG -->
  <div class="config-box">
    <div class="config-title">☁️ Cloudinary 설정 (무료 CDN)</div>
    <div class="config-row">
      <div class="config-field">
        <label>Cloud Name</label>
        <input type="text" id="cfg-cloud" placeholder="your_cloud_name">
      </div>
      <div class="config-field">
        <label>Upload Preset (Unsigned)</label>
        <input type="text" id="cfg-preset" placeholder="unsigned_preset">
      </div>
    </div>
    <div style="font-size:0.72rem; color:var(--muted); margin-bottom:10px; line-height:1.6">
      💡 <a href="https://cloudinary.com/console/settings/upload" target="_blank" style="color:var(--cyan)">Cloudinary 콘솔</a>에서 Upload Preset을 <b style="color:var(--text)">Unsigned</b>로 생성하세요. 무료 25GB.
    </div>
    <button class="config-save-btn" onclick="saveConfig()">💾 저장</button>
    <span id="cfg-saved" style="font-size:0.75rem; color:var(--success); margin-left:10px; display:none">✓ 저장됨</span>
  </div>

  <!-- STYLE TABS -->
  <div class="section-label">스타일별 음원 관리</div>
  <div class="style-tabs" id="style-tabs"></div>
  <div class="track-list" id="track-list"></div>

</div>

<!-- TOAST -->
<div id="toast"></div>

<script>
// ── CONFIG ──
const ADMIN_TOKEN = 'bigcat2026'; // 변경 가능

const STYLES = [
  { id:1, steps:['Warm up','Input','Action','Game','Speaking','Wrap up'] },
  { id:2, steps:['Hook','Story','Mission','Game','Speaking','Wrap up'] },
  { id:3, steps:['Warm up','Word','Practice','Game 1','Game 2','Wrap up'] },
  { id:4, steps:['Warm up','Word','Mission','Team game','Challenge','Wrap up'] },
  { id:5, steps:['Warm up','Word','Modeling','Role play','Game','Wrap up'] }
];

let currentStyleId = 1;

// ── LOGIN ──
function doLogin() {
  const val = document.getElementById('token-input').value.trim();
  if (val === ADMIN_TOKEN) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('admin-screen').style.display = 'block';
    initAdmin();
  } else {
    document.getElementById('login-error').textContent = '❌ 토큰이 올바르지 않습니다.';
    document.getElementById('token-input').value = '';
  }
}

function logout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-screen').style.display = 'none';
  document.getElementById('token-input').value = '';
}

// ── INIT ──
function initAdmin() {
  loadConfig();
  renderTabs();
  renderTracks(currentStyleId);
  updateStats();
}

// ── CONFIG ──
function loadConfig() {
  const cloud = localStorage.getItem('bj_cloud') || '';
  const preset = localStorage.getItem('bj_preset') || '';
  document.getElementById('cfg-cloud').value = cloud;
  document.getElementById('cfg-preset').value = preset;
}

function saveConfig() {
  localStorage.setItem('bj_cloud', document.getElementById('cfg-cloud').value.trim());
  localStorage.setItem('bj_preset', document.getElementById('cfg-preset').value.trim());
  const el = document.getElementById('cfg-saved');
  el.style.display = 'inline';
  setTimeout(() => { el.style.display = 'none'; }, 2000);
  showToast('✅ Cloudinary 설정 저장됨');
}

// ── TABS ──
function renderTabs() {
  const container = document.getElementById('style-tabs');
  container.innerHTML = '';
  STYLES.forEach(s => {
    const btn = document.createElement('button');
    btn.className = 'style-tab' + (s.id === currentStyleId ? ' active' : '');
    btn.textContent = `Style ${s.id}`;
    btn.onclick = () => { currentStyleId = s.id; renderTabs(); renderTracks(s.id); };
    container.appendChild(btn);
  });
}

// ── TRACKS ──
function storageKey(styleId, stepName) {
  return `bigcat_jukebox_s${styleId}_${stepName.replace(/\s+/g,'_').toLowerCase()}`;
}

function getTrackData(styleId, stepName) {
  try {
    const raw = localStorage.getItem(storageKey(styleId, stepName));
    return raw ? JSON.parse(raw) : null;
  } catch { return null; }
}

function saveTrackData(styleId, stepName, data) {
  localStorage.setItem(storageKey(styleId, stepName), JSON.stringify(data));
}

function deleteTrackData(styleId, stepName) {
  localStorage.removeItem(storageKey(styleId, stepName));
}

function renderTracks(styleId) {
  const style = STYLES.find(s => s.id === styleId);
  const container = document.getElementById('track-list');
  container.innerHTML = '';

  style.steps.forEach((step, i) => {
    const data = getTrackData(styleId, step);
    const rowId = `row-${styleId}-${i}`;
    const row = document.createElement('div');
    row.className = 'track-row' + (data ? ' has-song' : '');
    row.id = rowId;

    row.innerHTML = `
      <div class="track-row-top">
        <span class="track-step-badge">${step}</span>
        <span class="track-song-name ${data ? '' : 'empty'}" id="name-${rowId}">
          ${data ? data.name : '등록된 곡 없음'}
        </span>
        <span class="track-status ${data ? 'ok' : 'none'}" id="status-${rowId}">
          ${data ? '✓ 등록됨' : '없음'}
        </span>
      </div>
      <div class="track-upload-area">
        <label class="upload-btn ${!getCloud() ? 'disabled' : ''}" id="uplabel-${rowId}">
          📤 MP3 업로드
          <input type="file" accept="audio/*" onchange="handleUpload(event,'${step}',${styleId},'${rowId}')">
        </label>
        <input class="track-url-input" type="url" placeholder="또는 URL 직접 입력..." 
          id="url-${rowId}" value="${data ? data.url : ''}">
        <button class="url-save-btn" onclick="saveUrl('${step}',${styleId},'${rowId}')">저장</button>
        ${data ? `<button class="delete-btn" onclick="deleteTrack('${step}',${styleId},'${rowId}')">🗑</button>` : ''}
      </div>
      <div class="upload-progress" id="prog-${rowId}">
        <div class="upload-progress-fill" id="prog-fill-${rowId}"></div>
      </div>
    `;
    container.appendChild(row);
  });
}

function getCloud() { return localStorage.getItem('bj_cloud') || ''; }
function getPreset() { return localStorage.getItem('bj_preset') || ''; }

async function handleUpload(e, step, styleId, rowId) {
  const file = e.target.files[0];
  if (!file) return;
  const cloud = getCloud();
  const preset = getPreset();
  if (!cloud || !preset) {
    showToast('⚠️ Cloudinary 설정을 먼저 입력하세요!', 'warn');
    return;
  }

  const label = document.getElementById(`uplabel-${rowId}`);
  const progWrap = document.getElementById(`prog-${rowId}`);
  const progFill = document.getElementById(`prog-fill-${rowId}`);
  label.classList.add('loading');
  label.textContent = '⏳ 업로드 중...';
  progWrap.style.display = 'block';
  progFill.style.width = '0%';

  try {
    const formData = new FormData();
    formData.append('file', file);
    formData.append('upload_preset', preset);
    formData.append('resource_type', 'video'); // audio uses 'video' in Cloudinary

    // XHR for progress
    await new Promise((resolve, reject) => {
      const xhr = new XMLHttpRequest();
      xhr.open('POST', `https://api.cloudinary.com/v1_1/${cloud}/video/upload`);
      xhr.upload.onprogress = (ev) => {
        if (ev.lengthComputable) {
          const pct = Math.round(ev.loaded / ev.total * 100);
          progFill.style.width = pct + '%';
        }
      };
      xhr.onload = () => {
        if (xhr.status === 200) {
          const res = JSON.parse(xhr.responseText);
          const trackData = {
            url: res.secure_url,
            name: file.name.replace(/\.[^.]+$/, ''),
            duration: res.duration ? formatTime(res.duration) : null,
            cloudinary_id: res.public_id,
            uploaded_at: new Date().toISOString()
          };
          saveTrackData(styleId, step, trackData);
          document.getElementById(`url-${rowId}`).value = res.secure_url;
          updateRowUI(rowId, styleId, step, trackData);
          updateStats();
          showToast(`✅ "${trackData.name}" 업로드 완료!`);
          resolve();
        } else {
          reject(new Error('Upload failed: ' + xhr.status));
        }
      };
      xhr.onerror = () => reject(new Error('Network error'));
      xhr.send(formData);
    });
  } catch(err) {
    showToast('❌ 업로드 실패: ' + err.message, 'error');
    label.textContent = '📤 MP3 업로드';
    label.classList.remove('loading');
  } finally {
    setTimeout(() => { progWrap.style.display = 'none'; }, 800);
    label.textContent = '📤 MP3 업로드';
    label.classList.remove('loading');
  }
}

function saveUrl(step, styleId, rowId) {
  const url = document.getElementById(`url-${rowId}`).value.trim();
  if (!url) { showToast('⚠️ URL을 입력하세요'); return; }
  const trackData = { url, name: step, duration: null, uploaded_at: new Date().toISOString() };
  saveTrackData(styleId, step, trackData);
  updateRowUI(rowId, styleId, step, trackData);
  updateStats();
  showToast(`✅ "${step}" URL 저장 완료!`);
}

function deleteTrack(step, styleId, rowId) {
  if (!confirm(`"${step}" 곡을 삭제할까요?`)) return;
  deleteTrackData(styleId, step);
  renderTracks(styleId);
  updateStats();
  showToast(`🗑 "${step}" 삭제됨`);
}

function updateRowUI(rowId, styleId, step, data) {
  const row = document.getElementById(rowId);
  if (!row) return;
  row.classList.add('has-song');
  document.getElementById(`name-${rowId}`).textContent = data.name;
  document.getElementById(`name-${rowId}`).classList.remove('empty');
  const status = document.getElementById(`status-${rowId}`);
  status.textContent = '✓ 등록됨';
  status.className = 'track-status ok';
}

function updateStats() {
  let total = 0;
  STYLES.forEach(s => {
    s.steps.forEach(step => {
      if (getTrackData(s.id, step)) total++;
    });
  });
  document.getElementById('stat-total').textContent = total;
}

function formatTime(s) {
  if (!s || isNaN(s)) return '';
  const m = Math.floor(s / 60);
  const sec = Math.floor(s % 60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}

// ── TOAST ──
let toastTimer;
function showToast(msg, type) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.style.borderColor = type === 'error' ? '#ff5252' : type === 'warn' ? '#ff6b2b' : '#f5e642';
  el.style.color = type === 'error' ? '#ff5252' : type === 'warn' ? '#ff6b2b' : '#f5e642';
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
