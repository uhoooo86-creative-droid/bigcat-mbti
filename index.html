<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BeatCat MBTI</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;overflow:hidden;background:#1A1A2A;font-family:'Nunito',sans-serif;color:#fff;touch-action:manipulation;}
button{cursor:pointer;font-family:'Nunito',sans-serif;border:none;outline:none;background:none;}
#app{display:flex;flex-direction:column;height:100%;max-width:430px;margin:0 auto;position:relative;}

/* ── 배경 그라디언트 (그룹별) ── */
#bg{position:fixed;inset:0;z-index:0;transition:background 0.5s ease;max-width:430px;margin:0 auto;}
#bg.NT{background:linear-gradient(160deg,#3A0A08 0%,#1A1A2A 55%);}
#bg.NF{background:linear-gradient(160deg,#2D1A00 0%,#1A1A2A 55%);}
#bg.SJ{background:linear-gradient(160deg,#061A2D 0%,#1A1A2A 55%);}
#bg.SP{background:linear-gradient(160deg,#061D0E 0%,#1A1A2A 55%);}

#app{position:relative;z-index:1;}

/* ── 헤더 ── */
#header{padding:18px 20px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.hd-logo{font-size:18px;font-weight:900;letter-spacing:-.01em;}
.hd-logo span{color:#E8584C;}
.hd-badge{font-size:10px;font-weight:900;padding:4px 12px;border-radius:20px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.7);letter-spacing:.05em;}

/* ── 그룹 탭 ── */
#group-tabs{display:flex;gap:6px;padding:0 16px 12px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#group-tabs::-webkit-scrollbar{display:none;}
.gtab{flex-shrink:0;padding:7px 16px;border-radius:20px;font-size:12px;font-weight:800;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.1);transition:all .2s;white-space:nowrap;}
.gtab.on.NT{background:#E8584C;color:#fff;border-color:#E8584C;box-shadow:0 4px 16px rgba(232,88,76,.4);}
.gtab.on.NF{background:#F5A623;color:#fff;border-color:#F5A623;box-shadow:0 4px 16px rgba(245,166,35,.4);}
.gtab.on.SJ{background:#4A90D9;color:#fff;border-color:#4A90D9;box-shadow:0 4px 16px rgba(74,144,217,.4);}
.gtab.on.SP{background:#5BAD6F;color:#fff;border-color:#5BAD6F;box-shadow:0 4px 16px rgba(91,173,111,.4);}

/* ── 앨범 아트 영역 ── */
#album-area{flex-shrink:0;padding:0 24px;margin-bottom:14px;}
.album-art{
  width:100%;aspect-ratio:1.6;border-radius:18px;
  display:flex;align-items:flex-end;
  position:relative;overflow:hidden;
  box-shadow:0 16px 48px rgba(0,0,0,.45);
  transition:background .4s;
}
.album-art.NT{background:linear-gradient(135deg,#E8584C,#F0844A);}
.album-art.NF{background:linear-gradient(135deg,#F5A623,#E85E4C);}
.album-art.SJ{background:linear-gradient(135deg,#4A90D9,#6A6DD9);}
.album-art.SP{background:linear-gradient(135deg,#5BAD6F,#3DBFB0);}
.album-art::before{content:'';position:absolute;inset:0;background:radial-gradient(circle at 25% 25%,rgba(255,255,255,.18),transparent 60%);}
.album-type{font-size:26px;font-weight:900;color:#fff;letter-spacing:.1em;line-height:1;text-shadow:0 3px 10px rgba(0,0,0,.3);}
.album-label{font-size:11px;color:rgba(255,255,255,.75);font-weight:800;margin-top:3px;}

/* 미리보기 이미지 */
.album-preview{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;border-radius:18px;z-index:4;}

/* ── 트랙 정보 ── */
#track-info{padding:0 24px;margin-bottom:18px;flex-shrink:0;}
.track-top{display:flex;align-items:center;gap:10px;margin-bottom:6px;}
.track-type-badge{font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;background:rgba(255,255,255,.12);color:rgba(255,255,255,.6);letter-spacing:.04em;white-space:nowrap;flex-shrink:0;}
.track-group{font-size:11px;font-weight:800;color:rgba(255,255,255,.35);letter-spacing:.06em;}
.track-title{font-size:28px;font-weight:900;color:#fff;line-height:1.15;margin-bottom:5px;letter-spacing:-.02em;}
.track-filename{font-size:11px;color:rgba(255,255,255,.4);font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* ── 유형 선택 칩 ── */
#type-bar{display:flex;gap:7px;padding:0 16px;margin-bottom:16px;flex-shrink:0;overflow-x:auto;scrollbar-width:none;}
#type-bar::-webkit-scrollbar{display:none;}
.tpill{flex-shrink:0;padding:8px 16px;border-radius:20px;font-size:13px;font-weight:800;background:rgba(255,255,255,.08);color:rgba(255,255,255,.5);border:1.5px solid rgba(255,255,255,.1);transition:all .18s;}
.tpill.on{color:#fff;border-color:transparent;}
.tpill.on.NT{background:#E8584C;box-shadow:0 3px 12px rgba(232,88,76,.4);}
.tpill.on.NF{background:#F5A623;box-shadow:0 3px 12px rgba(245,166,35,.4);}
.tpill.on.SJ{background:#4A90D9;box-shadow:0 3px 12px rgba(74,144,217,.4);}
.tpill.on.SP{background:#5BAD6F;box-shadow:0 3px 12px rgba(91,173,111,.4);}

/* ── 플레이어 컨트롤 ── */
#player{padding:0 24px;flex-shrink:0;margin-bottom:16px;}

/* 진행바 */
.prog-bar{width:100%;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin-bottom:8px;cursor:pointer;position:relative;}
.prog-fill{height:100%;border-radius:2px;width:0%;transition:width .2s linear;}
.NT .prog-fill,.prog-fill.NT{background:#E8584C;}
.NF .prog-fill,.prog-fill.NF{background:#F5A623;}
.SJ .prog-fill,.prog-fill.SJ{background:#4A90D9;}
.SP .prog-fill,.prog-fill.SP{background:#5BAD6F;}
.prog-time{display:flex;justify-content:space-between;font-size:10px;font-weight:800;color:rgba(255,255,255,.4);margin-bottom:16px;}

/* 재생 버튼 */
.play-row{display:flex;align-items:center;justify-content:center;gap:20px;}
.nav-skip{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.08);color:rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:900;transition:all .15s;}
.nav-skip:not([disabled]):active{transform:scale(.88);}
.nav-skip[disabled]{opacity:.25;}
.play-btn{
  width:64px;height:64px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:26px;
  box-shadow:0 6px 24px rgba(0,0,0,.3);
  transition:all .18s;flex-shrink:0;
}
.play-btn:active{transform:scale(.92);}
.NT .play-btn{background:#E8584C;}
.NF .play-btn{background:#F5A623;}
.SJ .play-btn{background:#4A90D9;}
.SP .play-btn{background:#5BAD6F;}

/* 파동 애니메이션 */
@keyframes ripple{0%{transform:scale(1);opacity:.6;}100%{transform:scale(1.8);opacity:0;}}
.play-btn.playing::before{content:'';position:absolute;width:64px;height:64px;border-radius:50%;border:2px solid currentColor;animation:ripple 1.2s ease-out infinite;}

/* ── 카드 정보 영역 (스크롤) ── */
#info-scroll{flex:1;overflow-y:auto;overflow-x:hidden;padding:0 16px 20px;}
#info-scroll::-webkit-scrollbar{width:2px;}
#info-scroll::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:1px;}

.info-card{background:rgba(255,255,255,.07);border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.08);}
.ic-label{font-size:10px;font-weight:900;letter-spacing:.1em;color:rgba(255,255,255,.35);text-transform:uppercase;margin-bottom:7px;}
.ic-text{font-size:13px;font-weight:700;color:rgba(255,255,255,.85);line-height:1.75;}
.ic-text.bold{font-size:14px;font-weight:900;color:#fff;}

/* 솔루션 */
.sol-card{border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid rgba(255,255,255,.12);}
.NT .sol-card{background:rgba(232,88,76,.18);}
.NF .sol-card{background:rgba(245,166,35,.18);}
.SJ .sol-card{background:rgba(74,144,217,.18);}
.SP .sol-card{background:rgba(91,173,111,.18);}
.sol-text{font-size:14px;font-weight:800;line-height:1.65;}
.NT .sol-text{color:#FF9E96;}
.NF .sol-text{color:#FFD080;}
.SJ .sol-text{color:#90C4FF;}
.SP .sol-text{color:#90E8A8;}

/* 게임 칩 */
.game-badge{display:inline-flex;align-items:center;gap:6px;padding:7px 14px;border-radius:20px;font-size:12px;font-weight:900;background:rgba(255,255,255,.12);color:#fff;margin-top:6px;}
</style>
</head>
<body>
<div id="bg" class="NT"></div>
<div id="app">

  <!-- 헤더 -->
  <div id="header">
    <div class="hd-logo">BeatCat <span>MBTI</span> 🐱</div>
    <div class="hd-badge" id="hd-badge">NT 전략형</div>
  </div>

  <!-- 그룹 탭 -->
  <div id="group-tabs">
    <button class="gtab on NT" data-g="NT">🔴 NT 전략형</button>
    <button class="gtab" data-g="NF">🟡 NF 공감형</button>
    <button class="gtab" data-g="SJ">🔵 SJ 안정형</button>
    <button class="gtab" data-g="SP">🟢 SP 활동형</button>
  </div>

  <!-- 앨범 아트 -->
  <div id="album-area">
    <div class="album-art NT" id="album-art">
      <!-- 픽토그램 SVG -->
      <div id="album-pic" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;z-index:1;"></div>
      <!-- 하단 유형 정보 -->
      <div style="position:absolute;bottom:14px;left:16px;right:16px;z-index:3;">
        <div class="album-type" id="album-type">INTJ</div>
        <div class="album-label" id="album-label">전략형 교사</div>
      </div>
      <img id="preview-img" class="album-preview" src="" alt="" style="display:none;"
        onload="this.style.display='block';"
        onerror="this.style.display='none';"/>
    </div>
  </div>

  <!-- 트랙 정보 -->
  <div id="track-info">
    <div class="track-top">
      <div class="track-type-badge" id="track-type-badge">INTJ</div>
      <div class="track-group" id="track-group">NT · 전략형 교사</div>
    </div>
    <div class="track-title" id="track-title">Next Mission</div>
    <div class="track-filename" id="track-type">분析가NT-We are the Champion(INTJ)</div>
  </div>

  <!-- 유형 칩 -->
  <div id="type-bar"></div>

  <!-- 플레이어 -->
  <div id="player" class="NT">
    <div class="prog-bar" id="prog-bar" onclick="seekAudio(event)">
      <div class="prog-fill NT" id="prog-fill"></div>
    </div>
    <div class="prog-time">
      <span id="time-cur">0:00</span>
      <span id="time-tot">0:00</span>
    </div>
    <div class="play-row">
      <button class="nav-skip" id="btn-prev" onclick="prev()">‹‹</button>
      <button class="play-btn NT" id="play-btn" onclick="togglePlay()">▶</button>
      <button class="nav-skip" id="btn-next" onclick="nxt()">››</button>
    </div>
  </div>

  <!-- 카드 정보 -->
  <div id="info-scroll">
    <div id="card-info"></div>
  </div>

</div>

const GK=['NT','NF','SJ','SP'];
let cg='NT', ci=0;
let audioEl=null, isPlaying=false;
function tkeys(g){return Object.keys(D[g].types);}
function ct(){return tkeys(cg)[ci];}
function gcolor(g){return g==='NT'?'#E8584C':g==='NF'?'#F5A623':g==='SJ'?'#4A90D9':'#5BAD6F';}

// ── 그룹 탭 ──
document.querySelectorAll('#group-tabs .gtab').forEach(btn=>{
  btn.addEventListener('click',()=>{
    stopAudio();cg=btn.dataset.g;ci=0;
    document.querySelectorAll('#group-tabs .gtab').forEach(b=>b.classList.remove('on','NT','NF','SJ','SP'));
    btn.classList.add('on',cg);
    renderAll();
  });
});

// ── 유형 칩 ──
function renderTypeBar(){
  const bar=document.getElementById('type-bar');bar.innerHTML='';
  tkeys(cg).forEach((t,i)=>{
    const td=D[cg].types[t];
    const btn=document.createElement('button');
    btn.className='tpill'+(i===ci?' on '+cg:'');
    btn.innerHTML=`<span style="margin-right:4px;">${td.icon}</span>${t}`;
    btn.onclick=()=>{stopAudio();ci=i;renderAll();};
    bar.appendChild(btn);
  });
}

// ── 메인 렌더 ──
function renderAll(){
  const g=cg, tk=ct(), td=D[g].types[tk];
  const asset=ASSETS[tk]||null;
  const hasAudio=!!(asset&&asset.audio);
  const audioName=hasAudio?asset.audio.name:'';
  const trackDisplay=audioName.replace(/\.mp3$/i,'');

  // 배경
  document.getElementById('bg').className=g;

  // 배지
  const badge=document.getElementById('hd-badge');
  badge.textContent=D[g].label;

  // 앨범 아트
  const art=document.getElementById('album-art');
  art.className='album-art '+g;
  document.getElementById('album-type').textContent=tk;
  document.getElementById('album-label').textContent=td.label;

  // 픽토그램 SVG 내장 표시
  const picEl=document.getElementById('album-pic');
  picEl.innerHTML=PICS[tk]||'';

  // 미리보기 이미지 (있으면 픽토그램 위에 덮어씌움)
  const img=document.getElementById('preview-img');
  img.style.display='none';
  img.src=`./assets/previews/${tk}-preview.png`;

  // 트랙 정보
  document.getElementById('track-type-badge').textContent=tk;
  document.getElementById('track-group').textContent=`${g} · ${td.label}`;
  document.getElementById('track-title').textContent=td.game;
  document.getElementById('track-type').textContent=hasAudio?trackDisplay:'음원 없음';

  // 플레이어 색상
  document.getElementById('player').className=g;
  document.getElementById('prog-fill').className='prog-fill '+g;
  const playBtn=document.getElementById('play-btn');
  playBtn.className='play-btn '+g+(isPlaying?' playing':'');
  playBtn.textContent=isPlaying?'⏸':'▶';
  playBtn.disabled=!hasAudio;
  if(!hasAudio) playBtn.style.opacity='.35';
  else playBtn.style.opacity='1';

  // 네비
  renderTypeBar();
  renderNavPips();

  // 카드 정보
  renderCardInfo(g,td);

  // 진행바 초기화
  if(!isPlaying){
    document.getElementById('prog-fill').style.width='0%';
    document.getElementById('time-cur').textContent='0:00';
    document.getElementById('time-tot').textContent='0:00';
  }
}

function renderNavPips(){
  document.getElementById('btn-prev').disabled=ci===0;
  document.getElementById('btn-next').disabled=ci===tkeys(cg).length-1;
}

function renderCardInfo(g,td){
  const wrap=document.getElementById('card-info');
  wrap.className=g;
  // tip을 줄바꿈 기준으로 분리
  const tipLines=td.tip.split('\n');
  const tipMain=tipLines[0];
  const tipBgm=tipLines.find(l=>l.startsWith('🎵'))||'';
  const tipMat=tipLines.find(l=>l.startsWith('📎'))||'';
  wrap.innerHTML=`
    <div class="info-card">
      <div class="ic-label">🧠 교사 특징</div>
      <div class="ic-text">${td.trait}</div>
    </div>
    <div class="sol-card">
      <div class="ic-label">💬 솔루션</div>
      <div class="sol-text">${td.solution}</div>
    </div>
    <div class="info-card">
      <div class="ic-label">${td.gi} ${td.gt}</div>
      <div class="ic-text bold">${td.game}</div>
      <div style="font-size:12px;color:rgba(255,255,255,.6);font-weight:700;margin-top:8px;line-height:1.7;">${tipMain}</div>
    </div>
    ${tipBgm||tipMat?`
    <div class="info-card" style="display:flex;gap:10px;flex-wrap:wrap;">
      ${tipBgm?`<div style="flex:1;min-width:0;">
        <div class="ic-label">🎵 음원</div>
        <div style="font-size:12px;font-weight:800;color:rgba(255,255,255,.8);">${tipBgm.replace('🎵 ','')}</div>
      </div>`:''}
      ${tipMat?`<div style="flex:1;min-width:0;">
        <div class="ic-label">📎 교구</div>
        <div style="font-size:11px;font-weight:700;color:rgba(255,255,255,.7);line-height:1.6;">${tipMat.replace('📎 ','')}</div>
      </div>`:''}
    </div>`:''}
  `;
}

// ── 오디오 ──
function stopAudio(){
  if(audioEl){audioEl.pause();audioEl=null;}
  isPlaying=false;
  const pb=document.getElementById('play-btn');
  if(pb){pb.textContent='▶';pb.classList.remove('playing');}
  document.getElementById('prog-fill').style.width='0%';
  document.getElementById('time-cur').textContent='0:00';
}

function togglePlay(){
  const asset=ASSETS[ct()]||null;
  if(!asset||!asset.audio) return;
  if(isPlaying){stopAudio();return;}
  if(audioEl) audioEl.pause();
  audioEl=new Audio(asset.audio.path);
  audioEl.addEventListener('timeupdate',()=>{
    if(!audioEl)return;
    const pct=audioEl.duration?(audioEl.currentTime/audioEl.duration*100):0;
    document.getElementById('prog-fill').style.width=pct+'%';
    document.getElementById('time-cur').textContent=fmt(audioEl.currentTime);
    document.getElementById('time-tot').textContent=fmt(audioEl.duration||0);
  });
  audioEl.addEventListener('ended',()=>stopAudio());
  audioEl.addEventListener('error',()=>{alert('음원 파일을 찾을 수 없습니다.\n경로: '+asset.audio.path);stopAudio();});
  audioEl.play().then(()=>{
    isPlaying=true;
    const pb=document.getElementById('play-btn');
    pb.textContent='⏸';pb.classList.add('playing');
  }).catch(e=>{alert('재생 오류: '+e.message);stopAudio();});
}

function seekAudio(e){
  if(!audioEl||!audioEl.duration)return;
  const bar=e.currentTarget;
  const pct=e.offsetX/bar.offsetWidth;
  audioEl.currentTime=pct*audioEl.duration;
}

function fmt(s){
  if(isNaN(s))return'0:00';
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return`${m}:${sec.toString().padStart(2,'0')}`;
}

// ── 네비 ──
function prev(){if(ci>0){stopAudio();ci--;renderAll();}}
function nxt(){if(ci<tkeys(cg).length-1){stopAudio();ci++;renderAll();}}

// 스와이프
let _sx=0;
document.getElementById('info-scroll').addEventListener('touchstart',e=>{_sx=e.touches[0].clientX;},{passive:true});
document.getElementById('info-scroll').addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-_sx;
  if(Math.abs(dx)>50){dx<0?nxt():prev();}
});

// 키보드
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight')nxt();
  if(e.key==='ArrowLeft')prev();
  if(e.key===' ')togglePlay();
});

// 초기화
loadAssets();
</script>
</body>
</html>
